default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default
  database: commutebeh_development

test:
  <<: *default
  database: commutebeh_test

staging:
  <<: *default

production:
  <<: *default

services:
  - type: web
    name: commutebeh-rails
    runtime: ruby
    region: singapore
    plan: starter
    buildCommand: bundle install
    preDeployCommand: bundle exec rails db:migrate
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /health
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SKIP_ASSET_COMPILATION
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DEVISE_JWT_SECRET_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: HONO_API_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_S3_ENDPOINT
        sync: false
      - key: SUPABASE_S3_ACCESS_KEY
        sync: false
      - key: SUPABASE_S3_SECRET_KEY
        sync: false
      - key: SUPABASE_S3_REGION
        value: ap-southeast-1
      - key: SUPABASE_STORAGE_BUCKET
        value: commute-navigator-maps
